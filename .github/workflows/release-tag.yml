name: Release Tag

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Promote to main and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag will be: v${VERSION}"

      - name: Verify release commit is on develop
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_MSG=$(git log -1 --format="%s")
          if [ "$LATEST_MSG" != "Release v${VERSION}" ]; then
            echo "::error::Latest commit on develop is '${LATEST_MSG}', not 'Release v${VERSION}'. Has the release PR been merged into develop?"
            exit 1
          fi

      - name: Verify CI is green on develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          CONCLUSION=$(gh run list \
            --branch develop \
            --workflow ci.yml \
            --json headSha,conclusion \
            --limit 20 \
            | jq -r --arg sha "$SHA" \
              '[.[] | select(.headSha == $sha and .conclusion != "")] | first | .conclusion // "not-found"')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI conclusion on develop@${SHA} is '${CONCLUSION}' — must be 'success' before tagging."
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists — was this release already published?"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Open and merge develop → main PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_URL=$(gh pr create \
            --base main \
            --head develop \
            --title "Release v${VERSION}" \
            --body "Promote release v${VERSION} from develop to main.")
          gh pr merge "$PR_URL" --merge

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git fetch origin main
          git checkout main
          git tag "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
          echo "Pushed tag v${VERSION} — the Publish workflow will start shortly."
